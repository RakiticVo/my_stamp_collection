name: my_stamp_collection
description: "Stampzy - A digital stamp collection app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  sqflite: ^2.4.2
  path: ^1.9.1
  dio: ^5.9.0
  get_it: ^8.2.0
  google_fonts: ^6.3.1
  image_picker: ^1.2.0
  path_provider: ^2.1.5
  permission_handler: ^11.4.0
  perforated_border: 1.0.3
  flutter_colorpicker: ^1.1.0
  intl: ^0.20.2
  share_plus: ^13.0.0
  geolocator: ^14.0.1
  geocoding: ^4.0.0
  camera: ^0.11.0+4
  camera_android_camerax: ^0.6.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
